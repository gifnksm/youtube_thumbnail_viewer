<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      #thumbnail {
        display: block;
        width: 100%;       /* Fill the width of the popup */
        height: 100%;      /* Fill the height of the popup */
        object-fit: contain; /* Prevents stretching, maintains aspect ratio */
        max-width: 100%;
        max-height: 550px;
      }
    </style>
    <script defer src="index.js"></script>
  </head>

  <body>
    <img id="thumbnail" />
  </body>
</html>
